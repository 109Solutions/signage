const SUPABASE_URL = 'https://yleblfmurrwwztnmxnz.supabase.co';
const SUPABASE_KEY = 'sb_publishable_HfyzBAvCI_3xC6XjdDZsJw_BhKdBVc3';

function parseMins(t) {
  const m = t.match(/(\d{1,2}):(\d{2})/); if (!m) return -1;
  let h = parseInt(m[1]), min = parseInt(m[2]);
  if (h < 8) h += 12; return h * 60 + min;
}
function fmtTime(t) {
  const m = t.match(/(\d{1,2}):(\d{2})/); if (!m) return t;
  let h = parseInt(m[1]), min = m[2];
  if (h < 8) h += 12;
  return (h % 12 || 12) + ':' + min + ' ' + (h >= 12 ? 'PM' : 'AM');
}
function todayStr() { return new Date().toISOString().split('T')[0]; }

async function dbGet(wing) {
  try {
    const r = await fetch(
      SUPABASE_URL + '/rest/v1/schedules?wing=eq.' + wing + '&date=eq.' + todayStr() + '&select=activities',
      { headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY } }
    );
    const d = await r.json();
    if (d && d.length > 0 && d[0].activities) return JSON.parse(d[0].activities);
  } catch(e) { console.log('dbGet error:', e); }
  return null;
}

async function dbSet(wing, activities) {
  const payload = { wing, date: todayStr(), activities: JSON.stringify(activities) };
  // Check if record exists
  const checkR = await fetch(
    SUPABASE_URL + '/rest/v1/schedules?wing=eq.' + wing + '&date=eq.' + todayStr(),
    { headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY } }
  );
  const existing = await checkR.json();
  if (existing && existing.length > 0) {
    const r = await fetch(
      SUPABASE_URL + '/rest/v1/schedules?wing=eq.' + wing + '&date=eq.' + todayStr(),
      {
        method: 'PATCH',
        headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
        body: JSON.stringify({ activities: JSON.stringify(activities) })
      }
    );
    if (!r.ok) throw new Error('PATCH failed: ' + r.status);
  } else {
    const r = await fetch(
      SUPABASE_URL + '/rest/v1/schedules',
      {
        method: 'POST',
        headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
        body: JSON.stringify(payload)
      }
    );
    if (!r.ok) throw new Error('POST failed: ' + r.status);
  }
}

function wmoText(c) { if(c===0)return'Clear Sky';if(c<=2)return'Partly Cloudy';if(c===3)return'Overcast';if(c<=49)return'Foggy';if(c<=55)return'Drizzle';if(c<=67)return'Rain';if(c<=77)return'Snow';if(c<=82)return'Showers';return'Thunderstorm'; }


const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const now = new Date();
document.getElementById('date-label').textContent = days[now.getDay()] + ', ' + months[now.getMonth()] + ' ' + now.getDate() + ', ' + now.getFullYear();

let activities = [];

function initActivities() {
  const month = now.getMonth()+1, day = now.getDate();
  const base = (month===5 && CALENDAR[day]) ? CALENDAR[day] : [];
  activities = base.map(ev => ({time: ev[0], name: ev[1], loc: ev[2]||'', cancelled: false}));
  activities.sort((a,b) => parseMins(a.time) - parseMins(b.time));
}

function renderList() {
  const list = document.getElementById('alist');
  if (!activities.length) { list.innerHTML = '<p style="color:#bbb;text-align:center;padding:20px;">No activities for today.</p>'; return; }
  list.innerHTML = activities.map((ev,i) => `
    <div class="acard${ev.cancelled?' cancelled':''}" onclick="toggle(${i})">
      <div class="cbtn">${ev.cancelled ? '✕' : '✓'}</div>
      <div class="ainfo">
        <div class="atime">${fmtTime(ev.time)}</div>
        <div class="aname">${ev.name}</div>
        ${ev.loc ? `<div class="aloc">📍 ${ev.loc}</div>` : ''}
        ${ev.cancelled ? '<div class="cbadge">Cancelled</div>' : ''}
      </div>
    </div>`).join('');
}

function toggle(i) { activities[i].cancelled = !activities[i].cancelled; renderList(); }

function addActivity() {
  const t = document.getElementById('new-time').value;
  const n = document.getElementById('new-name').value.trim();
  const l = document.getElementById('new-loc').value.trim();
  if (!t || !n) { alert('Please enter a time and activity name.'); return; }
  const h = parseInt(t.split(':')[0]), m = t.split(':')[1];
  const display = (h%12||12) + ':' + m + ' ' + (h>=12?'PM':'AM');
  activities.push({time: display, name: n, loc: l, cancelled: false});
  activities.sort((a,b) => parseMins(a.time) - parseMins(b.time));
  document.getElementById('new-time').value = '';
  document.getElementById('new-name').value = '';
  document.getElementById('new-loc').value = '';
  renderList();
}

async function saveAndSync() {
  const btn = document.getElementById('save-btn');
  btn.disabled = true; btn.textContent = '⏳ Syncing...';
  document.getElementById('saved-msg').style.display = 'none';
  document.getElementById('err-msg').style.display = 'none';
  try {
    await dbSet(WING, activities);
    document.getElementById('saved-msg').style.display = 'block';
    setTimeout(() => document.getElementById('saved-msg').style.display = 'none', 5000);
  } catch(e) {
    console.log('Save error:', e);
    document.getElementById('err-msg').style.display = 'block';
  }
  btn.disabled = false; btn.textContent = '✅ Update All Displays';
}

async function loadExisting() {
  const saved = await dbGet(WING);
  if (saved) { activities = saved; }
  else { initActivities(); }
  renderList();
}

function resetToday() {
  if (!confirm('Reset to the original PDF schedule? This will undo all changes for today.')) return;
  initActivities(); renderList();
}

loadExisting();
