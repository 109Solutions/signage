<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lato:wght@300;400;700&display=swap');

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background: #f7f5f0;
    font-family: 'Lato', sans-serif;
    display: flex;
    flex-direction: column;
  }

  header {
    background: #4a9ca5;
    width: 100%;
    height: 15vh;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 5vw;
  }

  .logo-img {
    height: 9vh;
    width: auto;
  }

  .header-right { text-align: right; }

  .header-right h1 {
    font-family: 'Lato', sans-serif;
    font-weight: 700;
    font-size: 4.2vw;
    color: #fff;
    line-height: 1;
  }

  .header-right p {
    font-size: 1vw;
    color: rgba(255,255,255,0.85);
    letter-spacing: 0.4vw;
    text-transform: uppercase;
    margin-top: 0.6vh;
  }

  /* Grid: all cards same size, perfectly aligned across columns */
  #content {
    flex: 1;
    display: grid;
    padding: 2vh 4vw;
    gap: 1.2vh 2vw;
    overflow: hidden;
    min-height: 0;
    /* columns and rows set dynamically by JS */
  }

  .entry {
    display: flex;
    align-items: center;
    gap: 1.2vw;
    background: #fff;
    border-radius: 0.6vw;
    padding: 0 1.8vw;
    border-left: 0.5vw solid #4a9ca5;
    box-shadow: 0 0.2vh 1vh rgba(74,156,165,0.10);
  }

  .cake {
    font-size: 2vw;
    flex-shrink: 0;
    line-height: 1;
  }

  .info { display: flex; flex-direction: column; gap: 0.3vh; }

  .name {
    font-size: 1.9vw;
    font-weight: 700;
    color: #2c3e50;
    white-space: nowrap;
  }

  .date {
    font-size: 1.4vw;
    font-weight: 400;
    color: #4a9ca5;
    letter-spacing: 0.1vw;
    text-transform: uppercase;
  }

  .today-badge {
    margin-left: auto;
    background: #4a9ca5;
    color: #fff;
    font-size: 0.9vw;
    font-weight: 700;
    letter-spacing: 0.2vw;
    text-transform: uppercase;
    padding: 0.4vh 1vw;
    border-radius: 2vw;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .empty-msg {
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Playfair Display', serif;
    font-size: 3vw;
    color: #4a9ca5;
    opacity: 0.6;
  }

  footer {
    background: #4a9ca5;
    height: 1.2vh;
    flex-shrink: 0;
    width: 100%;
  }
</style>
</head>

  const monthNames = {

    5:"May",6:"June",7:"July",8:"August",
    9:"September",10:"October",11:"November",12:"December"
  };

  function render() {
    const now = new Date();
    const month = now.getMonth() + 1;
    const today = now.getDate();
    const year = now.getFullYear();

    document.getElementById('month-title').textContent = monthNames[month] + ' Birthdays';
    document.getElementById('year-label').textContent = year + ' Celebrations';

    const content = document.getElementById('content');
    const entries = (allBirthdays[month] || []).filter(e => e.day >= today);

    if (entries.length === 0) {
      content.style.gridTemplateColumns = '1fr';
      content.style.gridTemplateRows = '1fr';
      content.innerHTML = '<div class="empty-msg">No more birthdays this month 🎉</div>';
      return;
    }

    // Decide grid dimensions
    const n = entries.length;
    const cols = n <= 7 ? 1 : n <= 14 ? 2 : 3;
    const rows = Math.ceil(n / cols);

    // Set grid template so all cells are equal size
    content.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
    content.style.gridTemplateRows = `repeat(${rows}, 1fr)`;

    // Fill column by column so dates stay in order top-to-bottom, left-to-right
    // Re-order entries into grid order (column-major)
    const grid = Array(rows * cols).fill(null);
    for (let i = 0; i < entries.length; i++) {
      const col = Math.floor(i / rows);
      const row = i % rows;
      grid[row * cols + col] = entries[i];
    }

    let html = '';
    for (const e of grid) {
      if (!e) {
        html += '<div class="entry" style="visibility:hidden"></div>';
        continue;
      }
      const isToday = e.day === today;
      html += `
        <div class="entry">
          <span class="cake">${isToday ? '🥳' : '🎂'}</span>
          <div class="info">
            <div class="name">${e.name}</div>
            <div class="date">${monthNames[month]} ${e.day}</div>
          </div>
          ${isToday ? '<span class="today-badge">Today!</span>' : ''}
        </div>`;
    }

    content.innerHTML = html;
  }

  render();

  function scheduleNextDay() {
    const now = new Date();
    const tomorrow = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1);
    setTimeout(() => { render(); scheduleNextDay(); }, tomorrow - now);
  }
