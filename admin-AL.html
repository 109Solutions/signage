const GH_TOKEN = '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';
const GH_API = 'https://api.github.com/repos/109Solutions/signage/contents/schedule-data.json';
const PROXY = 'https://corsproxy.io/?';

function parseMins(t) {
  const m=t.match(/(\d{1,2}):(\d{2})/);if(!m)return -1;
  let h=parseInt(m[1]),min=parseInt(m[2]);if(h<8)h+=12;return h*60+min;
}
function fmtTime(t) {
  const m=t.match(/(\d{1,2}):(\d{2})/);if(!m)return t;
  let h=parseInt(m[1]),min=m[2];if(h<8)h+=12;
  return (h%12||12)+':'+min+' '+(h>=12?'PM':'AM');
}
function todayStr() { return new Date().toISOString().split('T')[0]; }

function ghHeaders() {
  return {
    'Authorization': 'token ' + GH_TOKEN,
    'Accept': 'application/vnd.github.v3+json',
    'Content-Type': 'application/json'
  };
}

async function dbGet(wing) {
  try {
    const url = PROXY + encodeURIComponent(GH_API);
    const r = await fetch(url, { headers: ghHeaders() });
    if (!r.ok) throw new Error('GET failed: ' + r.status);
    const d = await r.json();
    const data = JSON.parse(atob(d.content.replace(/\n/g,'')));
    const key = wing + '_' + todayStr();
    if (data[key]) return data[key];
  } catch(e) { console.log('dbGet error:', e); }
  return null;
}

async function dbSet(wing, activities) {
  const url = PROXY + encodeURIComponent(GH_API);
  const r1 = await fetch(url, { headers: ghHeaders() });
  if (!r1.ok) throw new Error('Read failed: ' + r1.status);
  const fileData = await r1.json();
  const sha = fileData.sha;
  const current = JSON.parse(atob(fileData.content.replace(/\n/g,'')));
  const key = wing + '_' + todayStr();
  current[key] = activities;
  const r2 = await fetch(url, {
    method: 'PUT',
    headers: ghHeaders(),
    body: JSON.stringify({
      message: 'Update ' + wing + ' ' + todayStr(),
      content: btoa(unescape(encodeURIComponent(JSON.stringify(current)))),
      sha: sha
    })
  });
  if (!r2.ok) {
    const t = await r2.text();
    throw new Error('Write failed: ' + r2.status + ' ' + t);
  }
}

function wmoIcon(c){if(c===0)return'☀️';if(c<=2)return'⛅';if(c===3)return'☁️';if(c<=49)return'🌫️';if(c<=67)return'🌧️';if(c<=77)return'❄️';return'⛈️';}
function wmoText(c){if(c===0)return'Clear Sky';if(c<=2)return'Partly Cloudy';if(c===3)return'Overcast';if(c<=67)return'Rain';if(c<=77)return'Snow';return'Storm';}

const days=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const months=['January','February','March','April','May','June','July','August','September','October','November','December'];
const now=new Date();
document.getElementById('dl').textContent=days[now.getDay()]+', '+months[now.getMonth()]+' '+now.getDate()+', '+now.getFullYear();
let activities=[];
function init(){
  const month=now.getMonth()+1,day=now.getDate();
  const base=(month===5&&CALENDAR[day])?CALENDAR[day]:[];
  activities=base.map(ev=>(({time:ev[0],name:ev[1],loc:ev[2]||'',cancelled:false})));
  activities.sort((a,b)=>parseMins(a.time)-parseMins(b.time));
}
function render(){
  const list=document.getElementById('alist');
  if(!activities.length){list.innerHTML='<p style="color:#bbb;text-align:center;padding:20px">No activities for today.</p>';return;}
  list.innerHTML=activities.map((ev,i)=>`
    <div class="ac${ev.cancelled?' cancelled':''}" onclick="tog(${i})">
      <div class="cb">${ev.cancelled?'✕':'✓'}</div>
      <div class="ai">
        <div class="at">${fmtTime(ev.time)}</div>
        <div class="an">${ev.name}</div>
        ${ev.loc?`<div class="al">📍 ${ev.loc}</div>`:''}
        ${ev.cancelled?'<div class="cx">Cancelled</div>':''}
      </div>
    </div>`).join('');
}
function tog(i){activities[i].cancelled=!activities[i].cancelled;render();}
function addAct(){
  const t=document.getElementById('nt').value;
  const n=document.getElementById('nn').value.trim();
  const l=document.getElementById('nl').value.trim();
  if(!t||!n){alert('Please enter a time and name.');return;}
  const h=parseInt(t.split(':')[0]),m=t.split(':')[1];
  activities.push({time:(h%12||12)+':'+m+' '+(h>=12?'PM':'AM'),name:n,loc:l,cancelled:false});
  activities.sort((a,b)=>parseMins(a.time)-parseMins(b.time));
  document.getElementById('nt').value='';document.getElementById('nn').value='';document.getElementById('nl').value='';
  render();
}
async function save(){
  const btn=document.getElementById('savebtn');
  btn.disabled=true;btn.textContent='⏳ Syncing...';
  document.getElementById('ok').style.display='none';
  document.getElementById('err').style.display='none';
  try{
    await dbSet(WING,activities);
    document.getElementById('ok').style.display='block';
    setTimeout(()=>document.getElementById('ok').style.display='none',5000);
  }catch(e){
    console.log('Save error:',e.message);
    const errEl=document.getElementById('err');
    errEl.style.display='block';
    errEl.textContent='⚠️ '+e.message;
  }
  btn.disabled=false;btn.textContent='✅ Update All Displays';
}
async function loadExisting(){
  const saved=await dbGet(WING);
  if(saved){activities=saved;}else{init();}
  render();
}
function reset(){if(!confirm('Reset to original PDF schedule?'))return;init();render();}
loadExisting();
